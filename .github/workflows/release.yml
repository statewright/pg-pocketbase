name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup PocketBase overlay
        run: make setup

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY="pg-pocketbase_${GOOS}_${GOARCH}"
          go build -tags "postgres,no_default_driver" -ldflags="-s -w" -o "${BINARY}" ./examples/basic/
          zip "${BINARY}.zip" "${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-pocketbase_${{ matrix.goos }}_${{ matrix.goarch }}
          path: "*.zip"

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
