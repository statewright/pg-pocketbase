services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pgpb
      POSTGRES_PASSWORD: pgpb
      POSTGRES_DB: pgpb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgpb"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
